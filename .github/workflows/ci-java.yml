name: CI Java

on:
  push:
    branches: [main]
    paths:
      - "libraries/java/**"
  pull_request:
    branches: [main]
    paths:
      - "libraries/java/**"

jobs:
  build-java:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew test
        working-directory: libraries/java
