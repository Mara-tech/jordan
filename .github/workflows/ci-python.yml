name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check server/ libraries/python/ libraries/cli/

  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install server dependencies and pytest
        run: pip install -r server/requirements.txt pytest
      - name: Run server tests
        run: pytest server/tests/

  test-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install jordan_py and test dependencies
        run: pip install -e "libraries/python/jordan_py[test]"
      - name: Run library tests
        run: pytest libraries/python/

  test-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install jordan_py
        run: pip install -e "libraries/python/jordan_py"
      - name: Install jordan_cli and test dependencies
        run: pip install -e "libraries/cli[dev]"
      - name: Run CLI tests
        run: pytest libraries/cli/tests/
