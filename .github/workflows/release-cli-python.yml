name: Release CLI

on:
  push:
    tags:
      - "jordan_cli/v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build
        working-directory: libraries/cli

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: libraries/cli/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi # matches the environment name configured in PyPI trusted publisher
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
